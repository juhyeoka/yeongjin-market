<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <meta name="theme-color" content="#ffffff">
  <title>i4 | 영진마켓</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      color: #172330;
      background: #f2f4f5;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        sans-serif;
    }

    img {
      display: block;
      width: 100%;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(100%, 720px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 18px 45px;
      background: #ffffff;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
    }

    .back {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      font-size: 23px;
      text-decoration: none;
      background: #f4f5f6;
      border-radius: 50%;
    }

    .header strong {
      font-size: 20px;
      font-weight: 900;
    }

    .header-space {
      width: 44px;
    }

    .hero {
      position: relative;
      height: 470px;
      overflow: hidden;
      background:
        linear-gradient(145deg, #fff8dd, #ebdeaf);
      border-radius: 27px;
    }

    .hero img {
      height: 100%;
      object-fit: cover;
    }

    .hero::after {
      position: absolute;
      inset: 0;
      content: "";
      background:
        linear-gradient(
          180deg,
          transparent 40%,
          rgba(10, 22, 34, 0.78) 100%
        );
    }

    .hero-copy {
      position: absolute;
      right: 27px;
      bottom: 27px;
      left: 27px;
      z-index: 2;
      color: #ffffff;
    }

    .badge {
      display: inline-flex;
      margin-bottom: 11px;
      padding: 7px 11px;
      color: #172330;
      font-size: 11px;
      font-weight: 900;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 999px;
    }

    .hero h1 {
      margin: 0 0 7px;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.87);
      font-size: 14px;
      font-weight: 700;
    }

    .intro {
      padding: 34px 3px;
      border-bottom: 1px solid #e8eaec;
    }

    .label {
      margin: 0 0 9px;
      color: #f24d42;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.8px;
    }

    .intro h2 {
      margin: 0 0 17px;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.45;
      letter-spacing: -1.4px;
    }

    .intro > p:last-child {
      margin: 0;
      color: #66717b;
      font-size: 14px;
      line-height: 1.9;
    }

    .information {
      margin-top: 25px;
      overflow: hidden;
      border: 1px solid #e7e9eb;
      border-radius: 20px;
    }

    .row {
      display: grid;
      grid-template-columns: 105px 1fr;
      gap: 18px;
      min-height: 58px;
      padding: 14px 18px;
      border-bottom: 1px solid #eceeef;
    }

    .row:last-child {
      border-bottom: 0;
    }

    .row span {
      color: #8a929a;
      font-size: 12px;
    }

    .row strong {
      font-size: 13px;
      font-weight: 800;
    }

    .actions {
      display: grid;
      gap: 11px;
      margin-top: 23px;
    }

    .action,
    .disabled {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
      padding: 15px 19px;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      border-radius: 18px;
    }

    .trace {
      color: #ffffff;
      background: #1b7d4a;
    }

    .shop {
      color: #ffffff;
      background: #03c75a;
    }

    .homepage {
      color: #ffffff;
      background: #172330;
    }

    .disabled {
      justify-content: center;
      color: #8b9298;
      background: #eceeef;
    }

    .notice {
      margin-top: 19px;
      padding: 18px;
      color: #737b83;
      font-size: 11px;
      line-height: 1.7;
      background: #f6f7f8;
      border-radius: 17px;
    }

    @media (max-width: 600px) {
      .page {
        padding: 13px 14px 35px;
      }

      .hero {
        height: 365px;
        border-radius: 23px;
      }

      .hero-copy {
        right: 21px;
        bottom: 22px;
        left: 21px;
      }

      .hero h1 {
        font-size: 30px;
      }

      .intro {
        padding: 29px 2px;
      }

      .intro h2 {
        font-size: 23px;
      }

      .row {
        grid-template-columns: 85px 1fr;
      }
    }
  </style>
</head>

<body>

      <div class="row">

      </div>

      <div class="row">
        <span>지역</span>
        <strong>충남 홍성</strong>
      </div>
    </section>

    <section class="actions">
      
            <a class="action trace" href="https://eggtrace-82hy.onrender.com/p/EGG-0001" target="_blank"
               rel="noopener noreferrer">
              농장 상태 확인
              <span>→</span>
            </a>
            

            <a class="action shop" href="https://smartstore.naver.com/i4company/products/13640294223" target="_blank"
               rel="noopener noreferrer">
              스마트스토어에서 구매
              <span>→</span>
            </a>
            

            <a class="action homepage" href="https://junada040828.cafe24.com/skin-skin10" target="_blank"
               rel="noopener noreferrer">

    <div class="notice">
      상품 가격, 배송, 교환 및 환불은 연결되는 각 업체의

    </div>
  </main>
</body>
</html>
